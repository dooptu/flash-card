<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FlashMaster | Premium Learning</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <meta name="description" content="Master any subject with flashcards and quizzes." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ────────────── SIDEBAR ────────────── -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">⚡</span>
        <span class="logo-text">FlashMaster</span>
      </div>
      <button class="close-btn" id="closeSidebar" aria-label="Close Menu">✕</button>
    </div>
    <nav class="topic-list" id="topicList" role="navigation" aria-label="Topics"></nav>
    <div class="sidebar-footer">v1.1 &nbsp;•&nbsp; AI-Powered</div>
  </aside>
  <div class="overlay" id="overlay"></div>

  <!-- ────────────── MAIN ────────────── -->
  <div class="app-shell">

    <!-- TOP BAR -->
    <header class="topbar">
      <button class="icon-btn menu-toggle" id="menuToggle" aria-label="Open Menu">☰</button>

      <div class="topic-meta">
        <h1 class="topic-title" id="currentTopicName">Select a topic</h1>
        <div class="progress-track">
          <div class="progress-fill" id="progressBar"></div>
        </div>
      </div>

      <div class="topbar-right">
        <!-- Mode Switcher -->
        <div class="mode-pills" role="group" aria-label="Study Mode">
          <button class="mode-pill active" data-mode="flashcard" id="modeFlashcard">📖 Cards</button>
          <button class="mode-pill" data-mode="multiple-choice" id="modeQuiz">📝 Quiz</button>
        </div>
        <!-- Toolbar buttons -->
        <div class="toolbar">
          <button class="tool-btn" id="fullscreenBtn" title="Toàn màn hình" aria-label="Toàn màn hình">
            <span class="tool-icon material-symbols-rounded">fullscreen</span>
          </button>
          <button class="tool-btn" id="settingsBtn" title="AI Settings" aria-label="AI Settings">
            <span class="tool-icon">⚙</span>
          </button>
          <button class="tool-btn" id="starredOnlyBtn" title="Starred Only" aria-label="Starred Only">
            <span class="tool-icon">★</span>
          </button>
          <button class="tool-btn" id="shuffleBtn" title="Shuffle" aria-label="Shuffle">
            <span class="tool-icon">⇌</span>
          </button>
        </div>
      </div>
    </header>

    <!-- STUDY AREA -->
    <main class="study-area" id="studyArea">

      <!-- COUNTER + STAR (always visible, outside 3D stack) -->
      <div class="card-hud">
        <span class="hud-counter" id="cardCounter">—</span>
        <div class="hud-actions">
          <button class="ai-explain-btn" id="aiExplainBtn" aria-label="AI Explain" title="Giải thích bằng AI" hidden>
            <span class="ai-btn-icon">✨</span>
            <span class="ai-btn-text">AI Explain</span>
          </button>
          <button class="star-btn" id="starBtn" aria-label="Star this card" title="Star this card">★</button>
        </div>
      </div>

      <!-- FLASHCARD VIEWER -->
      <div class="card-scene" id="cardScene">
        <div class="card-wrap" id="cardWrap">
          <div class="card-face card-front" id="cardFront">
            <span class="face-label">Question</span>
            <p class="face-text" id="frontText"></p>
          </div>
          <div class="card-face card-back" id="cardBack">
            <span class="face-label">Answer</span>
            <p class="face-text" id="backText"></p>
          </div>
        </div>
        <!-- Tap hint -->
        <p class="tap-hint" id="tapHint">Tap to flip &nbsp;• Swipe to navigate</p>
      </div>

      <!-- QUIZ VIEWER (hidden when in Cards mode) -->
      <div class="quiz-scene" id="quizScene" hidden>
        <div class="quiz-question-card" id="quizQuestionCard">
          <span class="face-label">Question</span>
          <p class="face-text" id="quizQuestionText"></p>
        </div>
        <div class="quiz-options-grid" id="quizOptionsGrid"></div>
      </div>

      <!-- NAVIGATION -->
      <nav class="nav-controls" aria-label="Card navigation">
        <button class="nav-btn prev" id="prevBtn" aria-label="Previous card">‹ Prev</button>
        <button class="nav-btn next" id="nextBtn" aria-label="Next card">Next ›</button>
      </nav>

    </main>
  </div>

  <!-- ────────────── AI EXPLAIN MODAL ────────────── -->
  <div class="modal-backdrop" id="aiModalBackdrop" hidden>
    <div class="modal ai-modal" id="aiModal" role="dialog" aria-modal="true" aria-labelledby="aiModalTitle">
      <div class="modal-header">
        <div class="modal-title-group">
          <span class="modal-gem-icon">✨</span>
          <h2 class="modal-title" id="aiModalTitle">AI Explanation</h2>
        </div>
        <button class="modal-close-btn" id="aiModalClose" aria-label="Close">✕</button>
      </div>
      <div class="modal-question-context" id="aiModalContext"></div>
      <div class="modal-body" id="aiModalBody">
        <div class="ai-loading" id="aiLoading">
          <div class="ai-dots">
            <span></span><span></span><span></span>
          </div>
          <p>Đang tạo giải thích…</p>
        </div>
        <div class="ai-content" id="aiContent" hidden></div>
        <div class="ai-error" id="aiError" hidden>
          <span class="ai-error-icon">⚠️</span>
          <p id="aiErrorMsg">Đã xảy ra lỗi</p>
          <button class="ai-retry-btn" id="aiRetryBtn">Thử lại</button>
        </div>
      </div>
      <div class="modal-footer">
        <span class="modal-powered">Powered by <strong>Gemini</strong></span>
        <button class="modal-copy-btn" id="aiCopyBtn" title="Sao chép">📋 Sao chép</button>
      </div>
    </div>
  </div>

  <!-- ────────────── SETTINGS MODAL ────────────── -->
  <div class="modal-backdrop" id="settingsModalBackdrop" hidden>
    <div class="modal settings-modal" id="settingsModal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle">
      <div class="modal-header">
        <div class="modal-title-group">
          <span class="modal-gem-icon">⚙</span>
          <h2 class="modal-title" id="settingsTitle">AI Settings</h2>
        </div>
        <button class="modal-close-btn" id="settingsModalClose" aria-label="Close">✕</button>
      </div>
      <div class="modal-body settings-body">
        <div class="settings-group">
          <label class="settings-label" for="apiKeyInput">🔑 Gemini API Key</label>
          <div class="api-key-row">
            <input
              type="password"
              class="api-key-input"
              id="apiKeyInput"
              placeholder="AIza..."
              autocomplete="off"
              spellcheck="false"
            />
            <button class="api-key-toggle" id="apiKeyToggle" title="Hiện / Ẩn">👁</button>
          </div>
          <p class="settings-hint">
            Lấy API key miễn phí tại
            <a href="https://aistudio.google.com/app/apikey" target="_blank" rel="noopener">Google AI Studio</a>.
            Key được lưu cục bộ trên trình duyệt của bạn.
          </p>
        </div>
        <div class="settings-group">
          <label class="settings-label" for="geminiModelSelect">🤖 Model</label>
          <select class="settings-select" id="geminiModelSelect">
            <option value="gemini-2.0-flash">Gemini 2.0 Flash (Nhanh)</option>
            <option value="gemini-2.0-flash-thinking-exp-01-21">Gemini 2.0 Flash Thinking (Suy luận)</option>
            <option value="gemini-1.5-pro">Gemini 1.5 Pro (Mạnh)</option>
          </select>
        </div>
        <div class="settings-group">
          <label class="settings-label" for="languageSelect">🌐 Ngôn ngữ giải thích</label>
          <select class="settings-select" id="languageSelect">
            <option value="vi">Tiếng Việt</option>
            <option value="en">English</option>
          </select>
        </div>
      </div>
      <div class="modal-footer">
        <button class="settings-save-btn" id="settingsSaveBtn">💾 Lưu cài đặt</button>
      </div>
    </div>
  </div>

  <!-- Floating Exit Fullscreen (Only visible in focused mode) -->
  <button class="fullscreen-exit-fab" id="fsExitFab" title="Thoát toàn màn hình" aria-label="Thoát toàn màn hình" hidden>
    <span class="material-symbols-rounded">close</span>
  </button>

  <!-- Config (local API key — gitignored, NOT committed) -->
  <script src="config.js"></script>
  <script src="main.js"></script>
</body>
</html>
